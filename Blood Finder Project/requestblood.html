<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Blood - Blood Finder</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 0;
    }

    header {
      background: #e63946;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 600px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #e63946;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      background: #e63946;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #c82333;
    }

    .success {
      display: none;
      margin-top: 15px;
      padding: 12px;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      border-radius: 6px;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>🩸 Blood Finder - Request Blood</header>

  <div class="container">
    <h2>Request Blood</h2>
    <form id="requestForm">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name" required>

      <label for="bloodGroup">Blood Group</label>
      <select id="bloodGroup" required>
        <option value="">-- Select Blood Group --</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
      </select>

      <label for="city">City</label>
      <input type="text" id="city" placeholder="Enter your city" required>

      <label for="phone">Contact Number</label>
      <input type="tel" id="phone" placeholder="Enter your phone number" required pattern="[0-9]{10}">

      <label for="reason">Reason for Request</label>
      <textarea id="reason" placeholder="Explain the reason for blood request..." required></textarea>

      <button type="submit">📨 Submit Request</button>
    </form>

    <div class="success" id="successMessage">✅ Your blood request has been submitted successfully!</div>
  </div>

  <script>
    document.getElementById("requestForm").addEventListener("submit", function(event){
      event.preventDefault();
      
      let name = document.getElementById("name").value;
      let bloodGroup = document.getElementById("bloodGroup").value;
      let city = document.getElementById("city").value;
      let phone = document.getElementById("phone").value;
      let reason = document.getElementById("reason").value;

      if(name && bloodGroup && city && phone && reason){
        // 🔹 Create request object
        let request = {
          name: name,
          bloodGroup: bloodGroup,
          city: city,
          phone: phone,
          reason: reason,
          time: new Date().toLocaleString()
        };

        // 🔹 Get existing requests from localStorage
        let requests = JSON.parse(localStorage.getItem("bloodRequests")) || [];

        // 🔹 Add new request
        requests.push(request);

        // 🔹 Save back to localStorage
        localStorage.setItem("bloodRequests", JSON.stringify(requests));

        // 🔹 Show success
        document.getElementById("successMessage").style.display = "block";

        // 🔹 Clear form
        document.getElementById("requestForm").reset();

        console.log("Saved Request:", request);
      }
    });
  </script>

</body>
</html>
