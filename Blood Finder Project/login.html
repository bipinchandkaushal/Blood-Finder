<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Finder Login</title>
<style>
  /* Reset default styles */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
  }

  /* Form container with hover effect */
  .login-container {
    background-color: #fff;
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 15px 25px rgba(0,0,0,0.2);
    width: 350px;
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .login-container:hover {
    transform: translateY(-5px);
    box-shadow: 0 25px 35px rgba(0,0,0,0.25);
  }

  .login-container h2 {
    margin-bottom: 30px;
    color: #d9534f;
  }

  /* Input fields with hover & focus effects */
  .login-container input[type="email"],
  .login-container input[type="password"] {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .login-container input[type="email"]:hover,
  .login-container input[type="password"]:hover,
  .login-container input[type="email"]:focus,
  .login-container input[type="password"]:focus {
    border-color: #d9534f;
    box-shadow: 0 0 8px rgba(217,83,79,0.4);
  }

  /* Button with hover effects */
  .login-container button {
    width: 100%;
    padding: 12px;
    background-color: #d9534f;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.2s, box-shadow 0.2s;
    margin-top: 15px;
  }

  .login-container button:hover {
    background-color: #c43e46;
    transform: translateY(-2px);
    box-shadow: 0 5px 10px rgba(196,62,70,0.4);
  }

  /* Register link hover */
  .login-container .register-link {
    display: block;
    margin-top: 15px;
    color: #d9534f;
    text-decoration: none;
    transition: color 0.3s;
  }

  .login-container .register-link:hover {
    text-decoration: underline;
    color: #a73339;
  }
</style>
</head>
<body>

<div class="login-container">
  <h2>Blood Finder Login</h2>
  <form action="#" method="POST">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <a href="register.html" class="register-link">Don't have an account? Register</a>
  </form>
</div>

</body>
</html>
